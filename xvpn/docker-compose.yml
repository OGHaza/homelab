services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - /opt/stacks/core/gluetun:/gluetun
    environment:
      - VPN_TYPE=wireguard
      - VPN_SERVICE_PROVIDER=${VPN_PROVIDER}
      - WIREGUARD_PRIVATE_KEY=${VPN_WG_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${VPN_WG_ADDRESS}
      - SERVER_CITIES=${VPN_CITIES}
      - SERVER_COUNTRIES=${VPN_COUNTRIES}
      - HTTP_CONTROL_SERVER_ADDRESS=:8000
      - DNS_UPSTREAM_PLAIN_ADDRESSES=${VPN_DNS_ADDRESS}
      - FIREWALL_OUTBOUND_SUBNETS=${INTERNAL_SUBNETS}
    ports:
      - 8000:8000     # gluetun web
      - 8282:8282     # qbittorrent web
      - 6881:6881     # qbittorrent peers
      - 6881:6881/udp # qbittorrent peers
      - 5030:5030     # slskd web
      - 5031:5031     # slskd internal
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "/gluetun-entrypoint", "healthcheck"]
      interval: 10s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "service:gluetun" # vpn
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - WEBUI_PORTS=8282/tcp
    volumes:
      - ./qbittorrent/config:/config
      - /mnt/gaza/media:/data/media_gaza
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f https://www.google.com || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  slskd:
    image: slskd/slskd:latest
    container_name: slskd
    restart: unless-stopped
    network_mode: "service:gluetun" # vpn
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - SLSKD_REMOTE_CONFIGURATION=true
      - SLSKD_DOWNLOADS_DIR=/data/media/downloads/music
      - SLSKD_SHARED_DIR=/data/media/music
    volumes:
      - ./slskd:/app
      - /mnt/gaza/media:/data/media
    depends_on:
      gluetun:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5030/health || exit 1"]
      interval: 60s
      start_period: 90s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 1.5G

networks:
  proxy-net:
    external: true
