services:
  seerr:
    image: seerr/seerr:latest
    container_name: seerr
    restart: unless-stopped
    user: 1000:1000
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - LOG_LEVEL=debug
    volumes:
      - /opt/stacks/view/seerr/config:/app/config
      - /mnt/gaza/media:/data/media_gaza
    ports:
      - 5055:5055
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5055/api/v1/status || exit 1"]
      interval: 60s
      start_period: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_PUBLISHED_SERVER_URL}
    volumes:
      - ./jellyfin/config:/config
      - /mnt/gaza/media:/data/media_gaza
    ports:
      - 8096:8096
      - 8920:8920
      - 7359:7359/udp
      - 1900:1900/udp
    devices:
      - /dev/dri:/dev/dri
    ulimits:
      nofile:
        soft: 8192
        hard: 65536
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8096 || exit 1"]
      interval: 60s
      start_period: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 2G

  stash:
    image: stashapp/stash:latest
    container_name: stash
    restart: unless-stopped
    ports:
      - "9999:9999"
    environment:
      - TZ=${TZ:-Australia/Sydney}
      - STASH_STASH=/data/adult
      - STASH_GENERATED=/data/stash/generated
      - STASH_METADATA=/data/stash/metadata/
      - STASH_CACHE=/data/stash/cache/
    volumes:
      - ./stash/config:/root/.stash
      - /mnt/gaza/media:/data
    devices:
      - /dev/dri:/dev/dri # gpu
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9999 || exit 1"]
      interval: 60s
      start_period: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  proxy-net:
    external: true
