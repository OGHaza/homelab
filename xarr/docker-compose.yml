services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./sonarr/config:/config
      - /mnt/galilee/media:/data/media # tv mount
    ports:
      - 8989:8989
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:8989/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./radarr/config:/config
      - /mnt/gaza/media:/data/media # movie mount
    ports:
      - 7878:7878
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:7878/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./bazarr/config:/config
      - /mnt/gaza/media:/data/media_gaza
      - /mnt/galilee/media:/data/media_galilee
    ports:
      - 6767:6767
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:6767/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  whisparr:
    image: ghcr.io/hotio/whisparr:latest
    container_name: whisparr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./whisparr/config:/config
      - /mnt/gaza/media:/data/media # adult mount
    ports:
      - 6969:6969
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:6969/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:9696/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    volumes:
      - ./flaresolverr/config:/config
    ports:
      - 8191:8191
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:8191 || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: unless-stopped
    user: 1000:1000
    ports:
      - 11011:11011
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - PORT=11011
      - BASE_PATH=
      - UMASK=022
    volumes:
      - ./cleanuparr/config:/config
      - /mnt/gaza/media:/data/media_gaza
      - /mnt/galilee/media:/data/media_galilee
    networks:
      - media-net
      - proxy-net
    healthcheck:
      test: "curl --fail http://localhost:11011/ping || exit 1"
      interval: 60s
      timeout: 10s
      start_period: 10s

  qbittorrent:
    image: ghcr.io/hotio/qbittorrent
    container_name: qbittorrent
    restart: unless-stopped
    network_mode: "container:gluetun" # vpn
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - WEBUI_PORTS=8282/tcp
    volumes:
      - ./qbittorrent/config:/config
      - /mnt/gaza/media:/data/media_gaza
      - /mnt/galilee/media:/data/media_galilee
    healthcheck:
      test: "ps aux | grep qbittorrent-nox | grep -v grep"
      interval: 60s
      timeout: 10s
      start_period: 10s

networks:
  media-net:
    driver: bridge
  proxy-net:
    external: true
