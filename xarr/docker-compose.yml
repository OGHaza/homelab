services:
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./sonarr/config:/config
      - /mnt/gaza/media:/data/media
    ports:
      - 8989:8989
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8989/ping || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./radarr/config:/config
      - /mnt/gaza/media:/data/media
    ports:
      - 7878:7878
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:7878/ping || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./bazarr/config:/config
      - /mnt/gaza/media:/data/media_gaza
    ports:
      - 6767:6767
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:6767/ping || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  lidarr:
    image: ghcr.io/hotio/lidarr:pr-plugins
    container_name: lidarr
    restart: unless-stopped
    logging:
      driver: json-file
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./lidarr/config:/config
      - /mnt/gaza/media:/data/media
    ports:
      - 8686:8686
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8686/ping || exit 1"]
      interval: 60s
      start_period: 90s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  pinchflat:
    image: ghcr.io/kieraneglin/pinchflat:latest
    container_name: pinchflat
    restart: unless-stopped
    environment:
      - TZ=Australia/Sydney
      - PUID=1000
      - PGID=1000
    ports:
      - 8945:8945
    volumes:
      - ./pinchflat/config:/config
      - /mnt/gaza/media/youtube:/downloads
    networks:
      - proxy-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
    volumes:
      - ./prowlarr/config:/config
    ports:
      - 9696:9696
    networks:
      - proxy-net
      - prowlarr-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:9696/ping || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    volumes:
      - ./flaresolverr/config:/config
    ports:
      - 8191:8191
    networks:
      - prowlarr-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8191 || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: unless-stopped
    user: 1000:1000
    ports:
      - 11011:11011
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Australia/Sydney}
      - PORT=11011
      - BASE_PATH=
      - UMASK=022
    volumes:
      - ./cleanuparr/config:/config
      - /mnt/gaza/media:/data/media_gaza
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:11011/ping || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  prowlarr-net:
    driver: bridge
  proxy-net:
    external: true
