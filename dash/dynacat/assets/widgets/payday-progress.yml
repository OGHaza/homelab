- type: custom-api
  title: Paycycle
  body-type: string
  skip-json-validation: true
  cache: 1h
  update-interval: 1h
  template: |
    {{ $now := now }}
    {{ $firstOfMonth := $now.AddDate 0 0 (sub 1 $now.Day) }}

    {{/* 1. Calculate This Month's Payday (First Friday) */}}
    {{ $wd := $firstOfMonth.Weekday }}
    {{ $offset := 0 }}
    {{ if eq $wd 0 }}{{ $offset = 5 }}{{ else if eq $wd 1 }}{{ $offset = 4 }}{{ else if eq $wd 2 }}{{ $offset = 3 }}{{ else if eq $wd 3 }}{{ $offset = 2 }}{{ else if eq $wd 4 }}{{ $offset = 1 }}{{ else if eq $wd 5 }}{{ $offset = 0 }}{{ else }}{{ $offset = 6 }}{{ end }}
    {{ $currentPayday := $firstOfMonth.AddDate 0 0 $offset }}

    {{/* 2. Determine if we are in the Current Cycle or the Next Cycle */}}
    {{/* We stay in the "Current" cycle until the day AFTER payday */}}
    {{ $startPayday := $currentPayday }}
    {{ $targetPayday := $currentPayday }}

    {{ if le $now.YearDay $currentPayday.YearDay }}
        {{/* Cycle: Last Month's Payday -> Today -> This Month's Payday */}}
        {{ $prevMonth := $firstOfMonth.AddDate 0 -1 0 }}
        {{ $wdPrev := $prevMonth.Weekday }}
        {{ $offPrev := 0 }}
        {{ if eq $wdPrev 0 }}{{ $offPrev = 5 }}{{ else if eq $wdPrev 1 }}{{ $offPrev = 4 }}{{ else if eq $wdPrev 2 }}{{ $offPrev = 3 }}{{ else if eq $wdPrev 3 }}{{ $offPrev = 2 }}{{ else if eq $wdPrev 4 }}{{ $offPrev = 1 }}{{ else if eq $wdPrev 5 }}{{ $offPrev = 0 }}{{ else }}{{ $offPrev = 6 }}{{ end }}
        {{ $startPayday = $prevMonth.AddDate 0 0 $offPrev }}
        {{ $targetPayday = $currentPayday }}
    {{ else }}
        {{/* Cycle: This Month's Payday -> Today -> Next Month's Payday */}}
        {{ $nextMonth := $firstOfMonth.AddDate 0 1 0 }}
        {{ $wdNext := $nextMonth.Weekday }}
        {{ $offNext := 0 }}
        {{ if eq $wdNext 0 }}{{ $offNext = 5 }}{{ else if eq $wdNext 1 }}{{ $offNext = 4 }}{{ else if eq $wdNext 2 }}{{ $offNext = 3 }}{{ else if eq $wdNext 3 }}{{ $offNext = 2 }}{{ else if eq $wdNext 4 }}{{ $offNext = 1 }}{{ else if eq $wdNext 5 }}{{ $offNext = 0 }}{{ else }}{{ $offNext = 6 }}{{ end }}
        {{ $startPayday = $currentPayday }}
        {{ $targetPayday = $nextMonth.AddDate 0 0 $offNext }}
    {{ end }}

    {{/* 3. Calculate Math */}}
    {{ $totalDays := sub $targetPayday.YearDay $startPayday.YearDay }}
    {{ $elapsedDays := sub $now.YearDay $startPayday.YearDay }}
    
    {{/* Handle Year Wraparound (Dec to Jan) */}}
    {{ if lt $totalDays 0 }}{{ $totalDays = add $totalDays 365 }}{{ end }}
    {{ if lt $elapsedDays 0 }}{{ $elapsedDays = add $elapsedDays 365 }}{{ end }}

    {{ $remainingDays := sub $totalDays $elapsedDays }}
    {{ if lt $remainingDays 0 }}{{ $remainingDays = 0 }}{{ end }}

    {{ $progress := 0 }}
    {{ if ge $elapsedDays $totalDays }}
        {{ $progress = 100 }}
    {{ else }}
        {{ $progress = div (mul $elapsedDays 100) $totalDays }}
    {{ end }}

    <div style="text-align: center;">
      <div class="width: 100%; progress-bar">
         <div class="progress-value" style="--percent: {{ $progress }}"></div>
       </div>
      <div class="size-h4" style="margin-top: 6px;">
        {{ if eq $remainingDays 0 }}
            💰 PAYDAY: 100%
        {{ else }}
            {{ $progress }}% ({{ $remainingDays }} days left)
        {{ end }}
      </div>
    </div>
