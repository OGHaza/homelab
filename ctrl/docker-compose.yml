services:
  komodo-db:
    image: mongo:7.0
    container_name: komodo-db
    restart: unless-stopped
    volumes:
      - ./komodo/mongodb_data:/data/db
    networks:
      - proxy-net
      - komodo-net
    healthcheck:
      test: ["CMD-SHELL", "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"]
      interval: 60s
      timeout: 10s
      start_period: 10s

  komodo-core:
    image: ghcr.io/moghtech/komodo-core:2
    container_name: komodo-core
    restart: unless-stopped
    depends_on:
      komodo-db:
        condition: service_healthy
    ports:
      - 9120:9120
    environment:
      - TZ=${TZ:-Australia/Sydney}
      - KOMODO_DATABASE_URI=mongodb://komodo-db:27017
      - KOMODO_LOCAL_AUTH=true
      - KOMODO_ENABLE_NEW_USERS=false
      - KOMODO_DISABLE_CONFIRM_DIALOG=true
      - KOMODO_DISABLE_USER_REGISTRATION=true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./komodo/config:/config
      - ./komodo/backups:/backups
      - ./komodo/keys:/config/keys
    networks:
      - proxy-net
      - komodo-net
    healthcheck:
      test: ["CMD-SHELL", "curl -s --connect-timeout 2 komodo-db:27017 | grep -q 'MongoDB' || exit 1"]
      interval: 60s
      timeout: 10s
      start_period: 10s

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=all
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - proxy-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - 8888:8080
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "/dozzle", "healthcheck"]
      interval: 60s
      timeout: 10s
      start_period: 60s

networks:
  komodo-net:
    driver: bridge
  proxy-net:
    external: true
