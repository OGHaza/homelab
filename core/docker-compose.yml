services:
  nginx-proxy:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - 80:80
      - 81:81
      - 443:443
    volumes:
      - ./nginx-proxy/data:/data
      - ./nginx-proxy/letsencrypt:/etc/letsencrypt
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD", "/usr/bin/check-health"]
      interval: 10s
      start_period: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    ports:
      - 53:53/tcp
      - 53:53/udp
      - 8080:80
    environment:
      - TZ=${TZ:-Australia/Sydney}
      - WEBPASSWORD=${PIHOLE_PASSWORD}
      - FTLCONF_webserver_port=8080
    volumes:
      - ./pihole/etc-pihole:/etc/pihole
      - ./pihole/etc-dnsmasq.d:/etc/dnsmasq.d
    cap_add:
      - NET_ADMIN
    networks:
      - proxy-net
    healthcheck:
      test: ["CMD-SHELL", "dig +short +norecurse +retry=0 @127.0.0.1 pi.hole || exit 1"]
      interval: 10s
      start_period: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    environment:
      - TZ=${TZ:-Australia/Sydney}
      - VIRTUAL_HOST=ntfy.home
      - VIRTUAL_PORT=80
      - WEBSOCKET=true
    user: "${PUID:-1000}:${PGID:-1000}"
    volumes:
      - ./ntfy/cache:/var/cache/ntfy
      - ./ntfy/config:/etc/ntfy
    ports:
      - 8082:80
    restart: unless-stopped
    networks:
      - proxy-net
    init: true # required with healthcheck for ntfy
    healthcheck:
      test: ["CMD-SHELL", "wget -q http://localhost:80/v1/health -O - | grep -q '\"healthy\":true' || exit 1"]
      interval: 60s
      start_period: 60s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

networks:
  proxy-net:
    external: true
